scenarios:
- name: Agent Creation - Happy Path
  description: A standard user successfully creates an agent using the expected flow,
    considering alternative navigation paths.
  priority: critical
  feature_category: forms
  target_feature: Agent Creation Form
  test_persona: happy_path
  steps_description: 1. Navigate to https://work.toqan.ai and click on 'Agents' in
    the main navigation menu. 2. On the Agents page, click on 'Create New Agent' button.
    3. Fill out the agent creation form with valid data and submit.
  success_criteria: A confirmation message 'Agent created successfully' appears, and
    the new agent is listed on the Agents page.
- name: Agent Creation - Confused Novice Misclick Test
  description: A novice user accidentally clicks incorrect buttons and backtracks
    during agent creation.
  priority: medium
  feature_category: navigation
  target_feature: Agent Creation Navigation
  test_persona: confused_novice
  steps_description: 1. Navigate to https://work.toqan.ai/agents and mistakenly click
    on a non-agent related link. 2. Use the browser back button to return to the Agents
    page. 3. Attempt to create a new agent by clicking 'Create New Agent'.
  success_criteria: The user is able to return to the Agents page without errors and
    successfully access the agent creation form.
- name: Agent Creation - Adversarial Input Test
  description: An adversarial user attempts to inject malicious scripts into the agent
    creation form.
  priority: high
  feature_category: forms
  target_feature: Agent Creation Form Security
  test_persona: adversarial
  steps_description: 1. Navigate to https://work.toqan.ai/agents and click on 'Create
    New Agent'. 2. Enter a script tag <script>alert('XSS')</script> in one of the
    input fields and submit.
  success_criteria: The input is sanitized, no alert box appears, and an error message
    'Invalid input detected' is shown.
- name: Agent Creation - Edge Case Special Characters Test
  description: Testing how special characters are handled in agent names during creation.
  priority: medium
  feature_category: forms
  target_feature: Agent Name Input Validation
  test_persona: edge_case
  steps_description: 1. Navigate to https://work.toqan.ai/agents and click on 'Create
    New Agent'. 2. Enter special characters like @#$%^&*() in the agent name field
    and submit.
  success_criteria: '''Invalid characters in name'' error message appears if special
    characters are not allowed, or successful creation if they are handled properly.'
- name: Agent Creation - Explorer Unusual Navigation Test
  description: An explorer user navigates through unexpected paths before creating
    an agent.
  priority: low
  feature_category: navigation
  target_feature: Site Navigation Flexibility
  test_persona: explorer
  steps_description: 1. Navigate to https://work.toqan.ai/agents, then go back to
    homepage using browser back button. 2. Use a different path like clicking on a
    footer link back to Agents page before creating an agent.
  success_criteria: The user can navigate using unconventional paths without encountering
    errors, reaching the agent creation form successfully.
- name: Agent Creation - Impatient User Rapid Interaction Test Revised
  description: An impatient user rapidly clicks through steps of creating an agent
    without waiting for page loads.
  priority: high
  feature_category: navigation
  target_feature: Page Load Handling During Agent Creation
  test_persona: impatient_user
  steps_description: 1. Rapidly navigate from homepage to https://work.toqan.ai/agents
    by clicking multiple times on 'Agents'. 2. Quickly click 'Create New Agent' multiple
    times before page fully loads.
  success_criteria: '''Please wait for page load'' message or similar feedback prevents
    multiple submissions or errors.'
- name: Agent Creation - Angry User Profanity Input Test
  description: An angry user inputs profanity into text fields during agent creation.
  priority: medium
  feature_category: forms
  target_feature: Input Validation for Profanity Filtering
  test_persona: angry_user
  steps_description: 1. Navigate to https://work.toqan.ai/agents and click on 'Create
    New Agent'. 2. Enter profanity into text fields such as name or description and
    submit.
  success_criteria: '''Inappropriate language detected'' error message appears, preventing
    submission with profanity.'
