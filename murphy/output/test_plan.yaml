- name: Happy Path Agent Creation
  description: A standard user successfully creates an agent using the expected flow,
    considering alternative routes but choosing the most straightforward one.
  priority: critical
  feature_category: forms
  target_feature: Agent Creation Form
  test_persona: happy_path
  steps_description: 1. Navigate to https://work.toqan.ai and click on 'Create Agent'.
    2. Fill in the 'Agent Name' field with a valid name and the 'Description' field
    with a brief description. 3. Click the 'Submit' button to create the agent.
  success_criteria: A confirmation message appears stating 'Agent created successfully',
    and the new agent is listed on the dashboard.
- name: Confused Novice Misclicks During Agent Creation
  description: A novice user misclicks during the agent creation process, leading
    to backtracking and corrections.
  priority: medium
  feature_category: forms
  target_feature: Agent Creation Form
  test_persona: confused_novice
  steps_description: 1. Navigate to https://work.toqan.ai and mistakenly click on
    'Help' instead of 'Create Agent'. 2. Return to the main page and correctly click
    on 'Create Agent'. 3. Enter an incorrect format in the 'Agent Name' field, receive
    an error, correct it, and then submit.
  success_criteria: The system provides clear error messages for incorrect inputs
    and allows successful submission after corrections.
- name: Adversarial Input Handling in Agent Creation Form
  description: An adversarial user attempts to inject malicious scripts into the agent
    creation form fields.
  priority: high
  feature_category: forms
  target_feature: Agent Creation Form
  test_persona: adversarial
  steps_description: 1. Navigate to https://work.toqan.ai and click on 'Create Agent'.
    2. Enter '<script>alert("XSS")</script>' in the 'Agent Name' field and attempt
