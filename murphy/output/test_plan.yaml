scenarios:
- name: Create agent — happy path via homepage
  description: Standard user starts from the https://work.toqan.ai homepage and creates
    a new agent using the primary creation flow. The scenario documents the chosen
    route and alternatives considered.
  priority: critical
  feature_category: forms
  target_feature: agent creation flow from homepage
  test_persona: happy_path
  steps_description: From the homepage, start the agent creation process (via primary
    call-to-action on the homepage, an Add/Create menu entry, or a keyboard shortcut/toolbar
    control). Provide required agent information and submit the creation form (use
    the visible Submit/Create control, press Enter to submit, or use a contextual
    menu action). After submission, verify the agent is available in the expected
    list or dashboard (refresh the homepage, navigate to an Agents or My Work area,
    or use a search/filter).
  success_criteria: The site confirms the new agent was created with visible feedback
    (a success banner or toast, the agent appears in the agents list, OR the app navigates
    to the agent details page OR a persisted entry is visible after page refresh).
- name: Recover from partial input — confused novice backs out and resumes
  description: A novice begins creating an agent from the homepage then navigates
    away or uses back before completing; they later return and attempt to resume.
    The site should guide and surface saved progress or instruct next steps.
  priority: high
  feature_category: forms
  target_feature: partial input recovery & guidance
  test_persona: confused_novice
  steps_description: Begin the agent creation process and fill some required fields
    (type sample name/info, select an option, or attach minimal data). Navigate away
    from the homepage or use the browser Back/Close (use navigation header links,
    browser back button, or close the tab). Return to the homepage and attempt to
    resume agent creation (reopen the creation control, click the same primary CTA,
    or check a Drafts/Recent area).
  success_criteria: The site provides visible guidance about the incomplete action
    (shows a resume draft prompt, displays inline hints/tooltips, OR surfaces the
    partially completed draft in a Drafts/Recent area). Silent rejection or no indication
    of prior progress is a failure; acceptable outcomes include explicit recovery
    prompt, inline hint to re-enter values, or redirect to the creation start with
    a visible explanation.
- name: Input sanitization — adversarial XSS and injection attempt
  description: An attacker attempts to inject malicious payloads into agent name/description
    fields from the homepage creation flow to test sanitization and server handling.
  priority: high
  feature_category: other
  target_feature: input sanitization and backend resilience
  test_persona: adversarial
  steps_description: 'Open the agent creation form from the homepage and enter payload-style
    input into text fields (insert common XSS-like strings, SQL-like sequences, or
    large unicode sequences; alternatives: use the description field, agent name,
    or any free-text input). Submit the form (use the Create/Submit control, pressing
    Enter, or submitting via an API call if available). Observe behavior across the
    UI and after navigation/refresh (check the agent listing, open the created agent
    if present, or inspect returned HTML/JSON).'
  success_criteria: The site handles malicious input without crashing or leaking sensitive
    data (payloads are sanitized or escaped and stored as inert text, form submission
    is rejected safely with guidance, OR the input is accepted but rendered inert
    on view). Any graceful sanitization, sanitized persistence, or safe rejection
    counts as pass; crashes, visible execution of payload, or data exfiltration are
    failures.
- name: Very long and unusual values — edge case input limits
  description: Test long strings, unusual unicode, and empty values during agent creation
    initiated from the homepage to evaluate limits and graceful degradation.
  priority: medium
  feature_category: forms
  target_feature: input length and character handling
  test_persona: edge_case
  steps_description: 'Start creating an agent from the homepage and populate fields
    with edge-case inputs: very long strings, repeated characters, international unicode,
    emoji, and empty strings (alternatively try max-length input, whitespace-only,
    or mixed-control characters). Attempt to submit the form (use the Create control,
    Enter key, or programmatic submit). Verify behavior after submission and on subsequent
    views (reload the homepage, view the agent entry, or export/inspect the record
    if available).'
  success_criteria: The site degrades gracefully for unusual inputs (truncates safely
    or stores full value without corruption, OR rejects input with visible explanation,
    OR sanitizes/stores inert content). Silent crashes, data corruption, or loss of
    unrelated data are failures; silent rejection is acceptable for edge_case per
    requirements.
- name: Discoverability — explorer navigates unusual paths from homepage
  description: An exploratory user tries to find agent creation and related features
    via unexpected navigation patterns from the homepage and expects orientation feedback.
  priority: medium
  feature_category: navigation
  target_feature: navigation discoverability and orientation
  test_persona: explorer
  steps_description: From the homepage, attempt multiple navigation routes to find
    agent-related functionality (use header/footer links, explore menus, attempt URL
    guessing such as /agents or /create, or search if available). When arriving at
    a page, look for orientation cues to confirm context (page titles, breadcrumbs,
    or 'no results' messaging).
  success_criteria: The site provides clear orientation feedback after unusual navigation
    (visible page title or breadcrumb reflecting current context, informative 'no
    items' or help message if feature not present, OR a prominent CTA guiding how
    to create an agent). Dead-end pages with no feedback are failures.
- name: Rapid submissions and double actions — impatient user stress
  description: A user rapidly triggers agent creation multiple times from the homepage
    (double-clicking Submit or repeatedly invoking creation) to test concurrency and
    feedback.
  priority: high
  feature_category: other
  target_feature: debounce/dedup and visible action feedback
  test_persona: impatient_user
  steps_description: Initiate an agent creation and, just before or after submitting,
    rapidly trigger submission again (double-click the Create/Submit control, press
    Enter repeatedly, or rapidly re-open and submit the form). Observe visual feedback
    and resulting state (look for loading indicators, disabled controls, duplicate
    entries in the agents list, or server error handling).
  success_criteria: The site provides visible state feedback and prevents harmful
    duplication (shows loading indicator or disables submit control and either prevents
    duplicate creation, consolidates requests, OR creates multiple entries but surfaces
    them with clear state). Silent deduplication or no visible feedback is a failure.
- name: Profanity and rage actions — angry user robustness
  description: A frustrated user inputs profanity and performs rage-clicks while attempting
    to create an agent from the homepage to ensure the app remains stable.
  priority: low
  feature_category: other
  target_feature: robustness against abusive input and click patterns
  test_persona: angry_user
  steps_description: Open the agent creation flow from the homepage and enter profanity
    or abusive text into free-text fields (also try repeated rapid clicking on controls
    or aggressive navigation). Submit the form and interact with the resulting UI
    (attempt to edit/delete the created item, navigate away, or refresh).
  success_criteria: The site absorbs abusive input and aggressive interactions without
    crashing or leaking data (stores/sanitizes the text as inert content, rejects
    with guidance, OR accepts but displays it safely). Crashes, corrupted data, or
    escalation to admin without silencing are failures.
- name: Network interruptions during creation — edge/adversarial network faults
  description: Simulate intermittent network failures or slow responses while creating
    an agent from the homepage to evaluate how the site handles partial/server failures.
  priority: medium
  feature_category: other
  target_feature: resilience to network faults during create
  test_persona: edge_case
  steps_description: 'Begin the agent creation process and submit while inducing network
    disruption (simulate a dropped connection, large latency, or server returning
    5xx; alternatives: offline mode, throttled network, or intermittent reconnects).
    After the interruption, check whether the UI recovers, retries, or surfaces next
    steps (refresh the homepage, attempt resubmit, or check for partial records).'
  success_criteria: The site handles network faults gracefully (shows retry or informative
    error state, preserves form data for retry, OR queues the action for later and
    indicates pending state). Silent data loss, crashes, or inconsistent corrupted
    records are failures.
